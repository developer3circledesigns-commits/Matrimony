services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: matrimony
      DB_USERNAME: matrimony_user
      DB_PASSWORD: matrimony_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrimony-net
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: matrimony
      MYSQL_USER: matrimony_user
      MYSQL_PASSWORD: matrimony_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/matrimony_complete.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/migrations/004_profile_indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql
      - ./database/migrations/005_add_phone_column.sql:/docker-entrypoint-initdb.d/03-phone.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/04-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - matrimony-net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: matrimony_user
      PMA_PASSWORD: matrimony_pass
      UPLOAD_LIMIT: 100M
      MAX_EXECUTION_TIME: 600
      MEMORY_LIMIT: 512M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrimony-net
    restart: unless-stopped

networks:
  matrimony-net:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
