services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: u814177917_matrimony
      DB_USERNAME: u814177917_matrimony
      DB_PASSWORD: bride_groom_matrimony@B123_
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrimony-net
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: u814177917_matrimony
      MYSQL_USER: u814177917_matrimony
      MYSQL_PASSWORD: bride_groom_matrimony@B123_
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - matrimony-net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: u814177917_matrimony
      PMA_PASSWORD: bride_groom_matrimony@B123_
      UPLOAD_LIMIT: 100M
      MAX_EXECUTION_TIME: 600
      MEMORY_LIMIT: 512M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - matrimony-net
    restart: unless-stopped

networks:
  matrimony-net:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
